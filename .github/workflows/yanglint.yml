name: build-yanglint

# Builds the yanglint image from the latest libyang release and pushes it to
# GHCR, and to Docker Hub when the DOCKERHUB_USERNAME / DOCKERHUB_TOKEN repo
# secrets are set. Runs weekly; only builds when that version has no image yet.
on:
  schedule:
    - cron: "0 6 * * 1" # weekly (Mondays 06:00 UTC) check for a new libyang release
  workflow_dispatch:
    inputs:
      version:
        description: "libyang version without leading v (e.g. 3.13.6). Empty = latest release."
        required: false
        default: ""
  push:
    branches: [master]
    paths:
      - "yanglint/**"
      - ".github/workflows/yanglint.yml"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/yanglint

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # Optional Docker Hub mirror. Leave the secret unset to push to GHCR only.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve libyang version
        id: ver
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          version="$INPUT_VERSION"
          if [[ -z "$version" ]]; then
            version=$(curl -fsSL https://api.github.com/repos/CESNET/libyang/releases/latest \
              | grep -oP '"tag_name":\s*"\K[^"]+' | sed 's/^v//')
          fi
          [[ -n "$version" ]] || { echo "could not resolve libyang version" >&2; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "target libyang version: $version"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # On the weekly schedule, skip when the latest version is already built.
      # On push (Dockerfile change) or manual dispatch, always (re)build.
      - name: Decide whether to build
        id: exists
        env:
          REF: ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]] && docker buildx imagetools inspect "$REF" >/dev/null 2>&1; then
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "$REF already exists - nothing to do."
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.exists.outputs.build == 'true' && env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # GHCR always; Docker Hub too when DOCKERHUB_USERNAME is set.
      - name: Compose image tags
        id: tags
        if: steps.exists.outputs.build == 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          {
            echo "tags<<EOF"
            echo "$IMAGE:$VERSION"
            echo "$IMAGE:latest"
            if [[ -n "$DOCKERHUB_USERNAME" ]]; then
              echo "docker.io/$DOCKERHUB_USERNAME/yanglint:$VERSION"
              echo "docker.io/$DOCKERHUB_USERNAME/yanglint:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.exists.outputs.build == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        if: steps.exists.outputs.build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        if: steps.exists.outputs.build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: yanglint
          file: yanglint/yanglint.dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.tags.outputs.tags }}
