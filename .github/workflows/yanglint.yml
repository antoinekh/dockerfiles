name: build-yanglint

# Builds ghcr.io/<owner>/yanglint from the latest libyang release.
# Runs weekly; only builds when the latest libyang version has no image yet.
on:
  schedule:
    - cron: "0 6 * * 1" # weekly (Mondays 06:00 UTC) check for a new libyang release
  workflow_dispatch:
    inputs:
      version:
        description: "libyang version without leading v (e.g. 3.13.6). Empty = latest release."
        required: false
        default: ""
  push:
    branches: [master]
    paths:
      - "yanglint/**"
      - ".github/workflows/yanglint.yml"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/yanglint
  # Run JS actions on Node 24 now (the forced default from 2026-06-16),
  # clearing the "Node.js 20 actions are deprecated" annotation.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve libyang version
        id: ver
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          version="$INPUT_VERSION"
          if [[ -z "$version" ]]; then
            version=$(curl -fsSL https://api.github.com/repos/CESNET/libyang/releases/latest \
              | grep -oP '"tag_name":\s*"\K[^"]+' | sed 's/^v//')
          fi
          [[ -n "$version" ]] || { echo "could not resolve libyang version" >&2; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "target libyang version: $version"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # On the weekly schedule, skip when the latest version is already built.
      # On push (Dockerfile change) or manual dispatch, always (re)build.
      - name: Decide whether to build
        id: exists
        env:
          REF: ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]] && docker buildx imagetools inspect "$REF" >/dev/null 2>&1; then
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "$REF already exists - nothing to do."
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: steps.exists.outputs.build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: steps.exists.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.exists.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: yanglint
          file: yanglint/yanglint.dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:latest
